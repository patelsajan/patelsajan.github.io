export default "<ion-header>\n  <ion-toolbar>\n    <ion-button slot=\"start\" routerLink=\"/home\" fill=\"clear\">\n      <ion-icon name=\"chevron-back\"></ion-icon>\n    </ion-button>\n    <ion-title>news</ion-title>\n  </ion-toolbar>\n</ion-header>\n\n<ion-content>\n  <ion-card *ngFor=\"let article of articles\">\n    <ion-card-header>\n      <ion-img [src]=\"article.urlToImage\"></ion-img>\n      <ion-card-title>{{article.title}}</ion-card-title>\n    </ion-card-header>\n    <ion-card-content>\n      <!-- {{article.content}} -->\n      {{article.description}}\n      <ion-item [href]=\"article.url\" target=\"_blank\" detail>read full article</ion-item>\n    </ion-card-content>\n  </ion-card>\n\n</ion-content>";
